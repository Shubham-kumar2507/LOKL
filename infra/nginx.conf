worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
    multi_accept on;
    use epoll;
}

http {
    # ── Security headers ────────────────────────────────
    server_tokens off;
    add_header X-Content-Type-Options nosniff always;
    add_header X-Frame-Options DENY always;
    add_header X-XSS-Protection "1; mode=block" always;

    # ── Timeouts ────────────────────────────────────────
    keepalive_timeout 65;
    client_body_timeout 12;
    client_header_timeout 12;
    send_timeout 10;
    client_max_body_size 5m;

    # ── Gzip compression ────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 4;
    gzip_types text/plain text/css application/json application/javascript text/xml;

    # ── Rate limiting zone ──────────────────────────────
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=30r/s;
    limit_conn_zone $binary_remote_addr zone=ws_limit:10m;

    # ── Upstream: API instances (ip_hash for sticky sessions) ──
    upstream api {
        ip_hash;
        server api_1:3001;
        server api_2:3001;
        server api_3:3001;
        keepalive 32;
    }

    upstream web {
        server web:3000;
        keepalive 16;
    }

    server {
        listen 80;
        server_name _;

        # ── REST API ────────────────────────────────────
        location /api/ {
            limit_req zone=api_limit burst=20 nodelay;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-Proto $scheme;

            # NOTE: We do NOT forward X-Real-IP or X-Forwarded-For
            # The API strips these headers anyway (privacy-first)
        }

        # ── WebSocket (Socket.io) ───────────────────────
        location /socket.io/ {
            limit_conn ws_limit 100;

            proxy_pass http://api;
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_set_header Host $host;
            proxy_read_timeout 86400s;
            proxy_send_timeout 86400s;

            # NOTE: No IP forwarding headers (privacy-first)
        }

        # ── Next.js frontend ────────────────────────────
        location / {
            proxy_pass http://web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header Connection "";
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # ── Static asset caching ────────────────────────
        location /_next/static/ {
            proxy_pass http://web;
            expires 365d;
            add_header Cache-Control "public, immutable";
        }
    }
}
